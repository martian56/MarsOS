name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            binutils \
            grub-pc-bin \
            xorriso \
            mtools \
            clang-format \
            qemu-system-x86

      - name: Check formatting
        run: make format-check

      - name: Build image
        run: make clean && make -j"$(nproc)"

      - name: Verify multiboot kernel
        run: make check

      - name: Smoke test
        run: make smoke

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: .smoke.log
          if-no-files-found: ignore
