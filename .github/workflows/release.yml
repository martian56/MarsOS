name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example: v0.1.0)"
        required: true
        type: string
      target:
        description: "Branch or commit to tag when creating a release manually"
        required: false
        default: "main"
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
            target="${{ inputs.target }}"
            prerelease="${{ inputs.prerelease }}"
          else
            tag="${GITHUB_REF_NAME}"
            target="${GITHUB_SHA}"
            prerelease="false"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+([.][0-9]+){0,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag '$tag'. Use a v-prefixed tag such as v1.2.3." >&2
            exit 1
          fi

          if [[ ! -f VERSION ]]; then
            echo "Missing VERSION file in repository root." >&2
            exit 1
          fi

          target_sha="$(git rev-parse --verify "${target}^{commit}" 2>/dev/null)" || {
            echo "Invalid target '$target'. Must resolve to a commit." >&2
            exit 1
          }

          version="${tag#v}"
          base_version="${version%%[-+]*}"
          repo_version="$(tr -d ' \t\r\n' < VERSION)"

          if [[ -z "$repo_version" ]]; then
            echo "VERSION file is empty." >&2
            exit 1
          fi

          if [[ "$repo_version" != "$base_version" ]]; then
            echo "VERSION mismatch: tag '$tag' expects '$base_version', VERSION has '$repo_version'." >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target=$target_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create tag when missing (manual release)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          target="${{ steps.meta.outputs.target }}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" "$target" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            binutils \
            grub-pc-bin \
            xorriso \
            mtools \
            clang-format \
            qemu-system-x86

      - name: Check formatting
        run: make format-check

      - name: Build image
        run: make clean && make -j"$(nproc)"

      - name: Verify multiboot kernel
        run: make check

      - name: Smoke test
        run: make smoke

      - name: Generate checksums
        run: sha256sum mars.iso kernel.bin > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.target }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: |
            mars.iso
            kernel.bin
            VERSION
            RELEASE_CHECKLIST.md
            .smoke.log
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
